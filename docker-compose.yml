version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - mongo

  frontend:
    build: ./frontend/web-app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000/api    
      - VITE_AUTH_URL=http://localhost:5000/auth
    stdin_open: true
    tty: true 
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend/web-app:/app
    working_dir: /app
    links:
      - backend
    networks:
      - erp-network
networks:
  erp-network:
    driver: bridge  
    
